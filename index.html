<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f6f5b">
  <title>拉斯维加斯高尔夫记分卡</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=32">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">拉斯维加斯规则</p>
        <h1>高尔夫记分卡</h1>
      </div>
      <div class="top-actions">
        <button id="shareButton" type="button" aria-label="分享应用" title="分享应用">分享</button>
        <button id="languageButton" class="language-button" type="button" aria-label="切换到英文" title="切换到英文">文/A</button>
      </div>
    </header>

    <main>
      <section class="score-strip" id="scoreStrip" aria-label="比赛总分" hidden>
        <div class="team-total team-a">
          <span class="label">A队</span>
          <span class="team-players" id="teamAPlayers">球员1 + 球员2</span>
          <strong id="teamATotal">0</strong>
        </div>
        <div class="match-meta">
          <span id="holesComplete">0/18</span>
          <span id="coursePar">标准杆 72</span>
        </div>
        <div class="team-total team-b">
          <span class="label">B队</span>
          <span class="team-players" id="teamBPlayers">球员3 + 球员4</span>
          <strong id="teamBTotal">0</strong>
        </div>
      </section>

      <nav class="tabs" aria-label="页面">
        <button class="tab active" type="button" data-view="start">主页</button>
        <button class="tab" type="button" data-view="play">记分</button>
        <button class="tab" type="button" data-view="courses">球场</button>
      </nav>

      <div class="sync-bar" id="syncBar" hidden>
        <span id="syncStatus">仅保存在本机</span>
        <button id="editGame" type="button">编辑</button>
      </div>

      <section class="view" id="playView">
        <div class="control-panel">
          <label>
            球场
            <select id="courseSelect"></select>
          </label>
          <label class="toggle-row">
            <span>小鸟球翻转</span>
            <input id="birdieFlip" type="checkbox">
          </label>
        </div>

        <section class="scorecard" aria-label="各洞成绩">
          <table>
            <thead>
              <tr>
                <th>H</th>
                <th>标准杆</th>
                <th class="team-a-cell"><input id="playerA1" type="text" autocomplete="off" aria-label="A队球员1"></th>
                <th class="team-a-cell"><input id="playerA2" type="text" autocomplete="off" aria-label="A队球员2"></th>
                <th class="team-a-cell calc-head">A#</th>
                <th class="team-a-cell calc-head">A+/-</th>
                <th class="team-b-cell"><input id="playerB1" type="text" autocomplete="off" aria-label="B队球员3"></th>
                <th class="team-b-cell"><input id="playerB2" type="text" autocomplete="off" aria-label="B队球员4"></th>
                <th class="team-b-cell calc-head">B#</th>
                <th class="team-b-cell calc-head">B+/-</th>
              </tr>
            </thead>
            <tbody id="scoreRows"></tbody>
            <tfoot>
              <tr>
                <th>合计</th>
                <th id="totalPar">72</th>
                <th id="totalPlayerA1">0</th>
                <th id="totalPlayerA2">0</th>
                <th></th>
                <th id="tableTeamATotal">0</th>
                <th id="totalPlayerB1">0</th>
                <th id="totalPlayerB2">0</th>
                <th></th>
                <th id="tableTeamBTotal">0</th>
              </tr>
            </tfoot>
          </table>
        </section>
      </section>

      <section class="view" id="coursesView">
        <div class="section-heading">
          <h2>球场</h2>
          <button class="primary" id="addCourse" type="button">添加球场</button>
        </div>
        <div class="course-list" id="courseList"></div>
      </section>

      <section class="view active" id="startView">
        <div class="section-heading">
          <h2>主页</h2>
          <button class="primary" id="newGame" type="button">新比赛</button>
        </div>
        <section class="game-section">
          <h3>进行中</h3>
          <div class="history-list" id="playingList"></div>
        </section>
        <section class="game-section">
          <h3>历史记录</h3>
          <div class="history-list" id="historyList"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="course-modal" id="courseModal" hidden>
    <form class="course-form" id="courseForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow">新球场</p>
          <h2>添加球场</h2>
        </div>
        <button class="icon-button" id="cancelCourse" type="button" aria-label="关闭添加球场窗口" title="关闭">x</button>
      </div>

      <label>
        球场名称
        <input id="newCourseName" type="text" autocomplete="off" required>
      </label>

      <div class="par-editor" aria-label="球场标准杆">
        <section>
          <h3>第1-9洞</h3>
          <div class="par-list" id="frontNineList"></div>
          <div class="nine-total">前九洞 <strong id="frontNineTotal">36</strong></div>
        </section>
        <section>
          <h3>第10-18洞</h3>
          <div class="par-list" id="backNineList"></div>
          <div class="nine-total">后九洞 <strong id="backNineTotal">36</strong></div>
        </section>
      </div>

      <div class="course-total">球场总标准杆 <strong id="courseParTotal">72</strong></div>

      <div class="action-row">
        <button class="primary" type="submit">保存球场</button>
        <button type="button" id="cancelCourseBottom">取消</button>
      </div>
    </form>
  </div>

  <div class="course-modal" id="gameModal" hidden>
    <form class="course-form game-form" id="gameForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow">比赛设置</p>
          <h2>新比赛</h2>
        </div>
        <button class="icon-button" id="cancelGame" type="button" aria-label="关闭新比赛窗口" title="关闭">x</button>
      </div>

      <div class="teams-grid">
        <section class="team-card team-a">
          <h3>A队</h3>
          <label>
            球员1
            <input id="newPlayerA1" type="text" autocomplete="off" required>
          </label>
          <label>
            球员2
            <input id="newPlayerA2" type="text" autocomplete="off" required>
          </label>
        </section>
        <section class="team-card team-b">
          <h3>B队</h3>
          <label>
            球员3
            <input id="newPlayerB1" type="text" autocomplete="off" required>
          </label>
          <label>
            球员4
            <input id="newPlayerB2" type="text" autocomplete="off" required>
          </label>
        </section>
      </div>

      <div class="game-options">
        <label>
          球场
          <select id="newGameCourse"></select>
        </label>
        <label>
          编辑密码
          <input id="newGameCode" type="text" inputmode="numeric" pattern="[0-9]{2}" maxlength="2" placeholder="00" required>
        </label>
        <label class="toggle-row">
          <span>小鸟球翻转</span>
          <input id="newGameBirdieFlip" type="checkbox" checked>
        </label>
      </div>

      <div class="action-row">
        <button class="primary" type="submit">开始比赛</button>
        <button type="button" id="cancelGameBottom">取消</button>
      </div>
    </form>
  </div>

  <div class="score-pad" id="scorePad" hidden>
    <div class="score-pad-sheet" role="dialog" aria-modal="true" aria-labelledby="scorePadPlayer">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="scorePadHole">第1洞 - 标准杆4</p>
          <h2 id="scorePadPlayer">球员</h2>
        </div>
        <button class="icon-button" id="scorePadClose" type="button" aria-label="关闭成绩输入" title="关闭">x</button>
      </div>

      <div class="score-stepper" aria-label="输入成绩">
        <button id="scorePadMinus" type="button" aria-label="减少杆数">-</button>
        <div class="score-pad-value" id="scorePadInput" aria-live="polite">--</div>
        <button id="scorePadPlus" type="button" aria-label="增加杆数">+</button>
      </div>

      <div class="score-quick" aria-label="快速选择成绩">
        <button type="button" data-score-offset="-2">老鹰球</button>
        <button type="button" data-score-offset="-1">小鸟球</button>
        <button type="button" data-score-offset="0">标准杆</button>
        <button type="button" data-score-offset="1">柏忌</button>
        <button type="button" data-score-offset="2">+2</button>
      </div>
    </div>
  </div>

  <div class="course-modal" id="appDialog" hidden>
    <form class="course-form dialog-form" id="dialogForm">
      <div class="modal-head">
        <div>
          <p class="eyebrow" id="dialogEyebrow">操作</p>
          <h2 id="dialogTitle">确认</h2>
        </div>
      </div>
      <p class="dialog-message" id="dialogMessage"></p>
      <label id="dialogInputWrap" hidden>
        <span id="dialogInputLabel">密码</span>
        <input id="dialogInput" type="text" inputmode="numeric" autocomplete="off">
      </label>
      <div class="action-row">
        <button class="primary" id="dialogOk" type="submit">确定</button>
        <button id="dialogCancel" type="button">取消</button>
      </div>
    </form>
  </div>

  <script src="./supabase-config.js?v=32"></script>
  <script src="./app.js?v=32" defer></script>
</body>
</html>
